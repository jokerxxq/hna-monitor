server {
    listen 80;
    server_name _;  # Replace _ with your domain name if you have one

    # Optional: max upload size
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Static files served directly by Nginx (optional optimization)
    location /static/ {
        alias /home/deploy/apps/hna-monitor/app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/hna-monitor.access.log;
    error_log  /var/log/nginx/hna-monitor.error.log;
}
